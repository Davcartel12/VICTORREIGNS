<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - VictorReigns Empire</title>
    <meta name="theme-color" content="#c9a84c">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VR Admin">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/admin.css">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => { });
            });
        }
    </script>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, serverTimestamp, query, orderBy, getDoc, setDoc }
            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // ─── YOUR FIREBASE CONFIG ─────────────────────────────────────────────
        const firebaseConfig = {
            apiKey: "AIzaSyDHyCtrsZRDOpD1atTNxokAExsNcPx5yNI",
            authDomain: "victoreigns-7f54c.firebaseapp.com",
            projectId: "victoreigns-7f54c",
            storageBucket: "victoreigns-7f54c.firebasestorage.app",
            messagingSenderId: "985990288367",
            appId: "1:985990288367:web:fc4f309e9939cb77819c1a",
            measurementId: "G-6GLQXF7TB3"
        };
        // ─────────────────────────────────────────────────────────────────────

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ── expose to window so inline JS can reach them ──────────────────────
        window._db = db;
        window._fb = {
            collection, addDoc, getDocs, deleteDoc, doc, updateDoc,
            serverTimestamp, query, orderBy, getDoc, setDoc
        };

        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <style>
        /* ══════════════════════════════════════════════════
           ADMIN PRODUCT MANAGER — extra styles
        ══════════════════════════════════════════════════ */
        :root {
            --gold: #c9a84c;
            --gold2: #e8c96e;
            --dark: #0f0f0f;
            --panel: #1a1a1a;
            --card: #222222;
            --border: #333333;
            --text: #e8e8e8;
            --muted: #888888;
            --red: #e05454;
            --green: #4caf7d;
            --blue: #4a9eff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Loading ── */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
            gap: 1.5rem;
        }

        .loading-bar-container {
            width: 220px;
            height: 3px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
        }

        .loading-bar {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, var(--gold), var(--gold2));
            transition: width .3s;
        }

        .loading-percentage {
            color: var(--gold);
            font-size: .85rem;
            letter-spacing: 2px;
        }

        .hidden {
            display: none !important;
        }

        /* ── Login ── */
        #login-screen {
            position: fixed;
            inset: 0;
            background: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9998;
        }

        .login-container {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .login-container h1 {
            font-size: 1.5rem;
            color: var(--gold);
            margin-bottom: .25rem;
        }

        .login-container p {
            color: var(--muted);
            font-size: .9rem;
            margin-bottom: 1.5rem;
        }

        .login-form .form-group {
            text-align: left;
            margin-bottom: 1rem;
        }

        .login-form label {
            display: block;
            font-size: .8rem;
            color: var(--muted);
            margin-bottom: .4rem;
        }

        .login-form input {
            width: 100%;
            padding: .7rem 1rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: .95rem;
            outline: none;
            transition: border-color .2s;
        }

        .login-form input:focus {
            border-color: var(--gold);
        }

        .login-form .btn {
            width: 100%;
            margin-top: .5rem;
        }

        .login-error {
            color: var(--red);
            font-size: .85rem;
            margin-top: .75rem;
            min-height: 1.2em;
        }

        /* ── Admin Layout ── */
        .admin-header {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: .9rem 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .admin-header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .admin-logo {
            display: flex;
            align-items: center;
            gap: .75rem;
            font-weight: 600;
            color: var(--gold);
        }

        .admin-main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* ── Tabs ── */
        .admin-tabs {
            display: flex;
            gap: .5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: .5rem;
            flex-wrap: wrap;
        }

        .admin-tab-btn {
            padding: .55rem 1.2rem;
            border-radius: 8px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: .9rem;
            transition: all .2s;
        }

        .admin-tab-btn:hover {
            color: var(--text);
            border-color: var(--border);
        }

        .admin-tab-btn.active {
            background: var(--gold);
            color: #000;
            font-weight: 600;
            border-color: var(--gold);
        }

        /* ── Stats ── */
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            border-left: 4px solid var(--gold);
        }

        .stat-card.pending {
            border-left-color: #ff9800;
        }

        .stat-card.processing {
            border-left-color: var(--blue);
        }

        .stat-card.completed {
            border-left-color: var(--green);
        }

        .stat-card h3 {
            font-size: .75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: .3rem;
        }

        .stat-card p {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text);
        }

        /* ── Controls ── */
        .admin-controls {
            display: flex;
            gap: .75rem;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 1.25rem;
        }

        .search-filter {
            display: flex;
            gap: .5rem;
            flex: 1;
            min-width: 260px;
        }

        .search-input,
        .filter-select {
            padding: .6rem .9rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: .88rem;
            outline: none;
            transition: border-color .2s;
        }

        .search-input {
            flex: 1;
        }

        .search-input:focus,
        .filter-select:focus {
            border-color: var(--gold);
        }

        .filter-select {
            min-width: 140px;
        }

        /* ── Buttons ── */
        .btn {
            padding: .6rem 1.2rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: .88rem;
            font-weight: 600;
            transition: all .2s;
            display: inline-flex;
            align-items: center;
            gap: .4rem;
        }

        .btn-primary {
            background: var(--gold);
            color: #000;
        }

        .btn-primary:hover {
            background: var(--gold2);
        }

        .btn-secondary {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .btn-danger {
            background: var(--red);
            color: #fff;
        }

        .btn-danger:hover {
            opacity: .85;
        }

        .btn-info {
            background: var(--blue);
            color: #fff;
        }

        .btn-sm {
            padding: .35rem .75rem;
            font-size: .8rem;
        }

        /* ── Table ── */
        .orders-table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .orders-table {
            width: 100%;
            border-collapse: collapse;
            font-size: .88rem;
        }

        .orders-table thead th {
            background: var(--panel);
            padding: .85rem 1rem;
            text-align: left;
            color: var(--muted);
            font-size: .75rem;
            text-transform: uppercase;
            letter-spacing: .5px;
            border-bottom: 1px solid var(--border);
        }

        .orders-table tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background .15s;
        }

        .orders-table tbody tr:hover {
            background: rgba(201, 168, 76, .05);
        }

        .orders-table tbody td {
            padding: .8rem 1rem;
            vertical-align: middle;
        }

        .no-orders {
            text-align: center;
            padding: 3rem;
            color: var(--muted);
        }

        /* ── Status badges ── */
        .badge {
            padding: .25rem .65rem;
            border-radius: 20px;
            font-size: .75rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        .badge-pending {
            background: rgba(255, 152, 0, .15);
            color: #ff9800;
        }

        .badge-processing {
            background: rgba(74, 158, 255, .15);
            color: var(--blue);
        }

        .badge-completed {
            background: rgba(76, 175, 125, .15);
            color: var(--green);
        }

        .badge-cancelled {
            background: rgba(224, 84, 84, .15);
            color: var(--red);
        }

        .badge-unread {
            background: rgba(74, 158, 255, .15);
            color: var(--blue);
        }

        .badge-read {
            background: rgba(136, 136, 136, .15);
            color: var(--muted);
        }

        .badge-replied {
            background: rgba(76, 175, 125, .15);
            color: var(--green);
        }

        .badge-active {
            background: rgba(76, 175, 125, .15);
            color: var(--green);
        }

        .badge-outofstock {
            background: rgba(224, 84, 84, .15);
            color: var(--red);
        }

        /* ── Modal ── */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 1rem;
        }

        .modal-content {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 580px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h2 {
            font-size: 1.1rem;
            color: var(--gold);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1.4rem;
            cursor: pointer;
            line-height: 1;
            transition: color .2s;
        }

        .modal-close:hover {
            color: var(--red);
        }

        .modal-body {
            padding: 1.5rem;
        }

        /* ── Product Form ── */
        .product-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: .4rem;
        }

        .form-group label {
            font-size: .8rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            padding: .65rem .9rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: .9rem;
            outline: none;
            transition: border-color .2s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--gold);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* ── Image Upload Zone ── */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            position: relative;
        }

        .upload-zone:hover,
        .upload-zone.dragover {
            border-color: var(--gold);
            background: rgba(201, 168, 76, .05);
        }

        .upload-zone input[type=file] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-zone .upload-icon {
            font-size: 2rem;
            margin-bottom: .5rem;
        }

        .upload-zone p {
            color: var(--muted);
            font-size: .88rem;
        }

        .upload-zone strong {
            color: var(--gold);
        }

        .image-preview {
            width: 100%;
            max-height: 180px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: .75rem;
            display: none;
        }

        /* ── Upload Progress ── */
        .progress-wrap {
            margin-top: .75rem;
            display: none;
        }

        .progress-bar-bg {
            background: var(--border);
            border-radius: 4px;
            height: 6px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), var(--gold2));
            border-radius: 4px;
            width: 0;
            transition: width .2s;
        }

        .progress-label {
            font-size: .78rem;
            color: var(--muted);
            margin-top: .3rem;
        }

        /* ── Product Cards Grid ── */
        .products-grid-admin {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.25rem;
            margin-top: 1rem;
        }

        .product-card-admin {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            transition: border-color .2s;
        }

        .product-card-admin:hover {
            border-color: var(--gold);
        }

        .product-card-admin img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #2a2a2a;
        }

        .product-card-admin .pc-body {
            padding: .9rem 1rem;
        }

        .product-card-admin .pc-name {
            font-weight: 600;
            font-size: .95rem;
            margin-bottom: .25rem;
        }

        .product-card-admin .pc-cat {
            font-size: .75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: .4rem;
        }

        .product-card-admin .pc-price {
            font-size: 1.05rem;
            color: var(--gold);
            font-weight: 700;
            margin-bottom: .25rem;
        }

        .product-card-admin .pc-stock {
            font-size: .8rem;
            margin-bottom: .75rem;
        }

        .product-card-admin .pc-actions {
            display: flex;
            gap: .5rem;
        }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: .8rem 1.2rem;
            font-size: .88rem;
            z-index: 9999;
            transform: translateY(120%);
            transition: transform .3s;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        #toast.show {
            transform: translateY(0);
        }

        #toast.success {
            border-left: 3px solid var(--green);
        }

        #toast.error {
            border-left: 3px solid var(--red);
        }

        /* ── VR Logo (reuse from main) ── */
        .vr-logo-mark {
            display: inline-flex;
            align-items: center;
            gap: .3rem;
        }

        .vr-crown {
            font-size: 1rem;
            color: var(--gold);
        }

        .vr-ring {
            border: 2px solid var(--gold);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .7rem;
            font-weight: 800;
            color: var(--gold);
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .admin-controls {
                flex-direction: column;
            }

            .search-filter {
                min-width: unset;
            }
        }

        /* ── Image upload zone ── */
        #drop-zone.dragover {
            border-color: var(--gold);
            background: rgba(201, 168, 76, .07);
        }
    </style>
</head>

<body>

    <!-- ══════════════════ LOADING SCREEN ══════════════════ -->
    <div id="loading-screen">
        <div style="text-align:center">
            <div class="vr-logo-mark" style="justify-content:center;margin-bottom:1rem">
                <span class="vr-crown">♛</span>
                <div class="vr-ring">VR</div>
            </div>
            <div class="loading-bar-container">
                <div class="loading-bar" id="loading-bar"></div>
            </div>
            <div class="loading-percentage" id="loading-percentage">0%</div>
        </div>
    </div>

    <!-- ══════════════════ LOGIN SCREEN ══════════════════ -->
    <div id="login-screen" class="hidden">
        <div class="login-container">
            <div class="vr-logo-mark" style="justify-content:center;margin-bottom:1rem">
                <span class="vr-crown">♛</span>
                <div class="vr-ring">VR</div>
            </div>
            <h1>Admin Panel</h1>
            <p>VictorReigns Empire</p>
            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="admin-password">Password</label>
                    <input type="password" id="admin-password" required placeholder="Enter admin password">
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <p class="login-error" id="login-error"></p>
            </form>
        </div>
    </div>

    <!-- ══════════════════ ADMIN PANEL ══════════════════ -->
    <div id="admin-panel" class="hidden">

        <!-- Header -->
        <header class="admin-header">
            <div class="admin-header-content">
                <div class="admin-logo">
                    <div class="vr-logo-mark">
                        <span class="vr-crown">♛</span>
                        <div class="vr-ring">VR</div>
                    </div>
                    VictorReigns Empire — Admin
                </div>
                <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
            </div>
        </header>

        <!-- Main -->
        <main class="admin-main">

            <!-- Tabs -->
            <div class="admin-tabs">
                <button class="admin-tab-btn active" onclick="switchTab('products')">📦 Products</button>
            </div>

            <!-- ══ PRODUCTS TAB ══ -->
            <div id="products-section" class="admin-section">
                <div class="admin-stats">
                    <div class="stat-card">
                        <h3>Total Products</h3>
                        <p id="total-products">0</p>
                    </div>
                </div>

                <div class="admin-controls">
                    <div
                        style="display:flex;align-items:center;gap:10px;background:var(--card);padding:0.4rem 0.8rem;border:1px solid var(--border);border-radius:8px;">
                        <span
                            style="color:var(--gold);font-size:0.85rem;font-weight:600;text-transform:uppercase;">Frontpage:</span>
                        <select id="home-title-toggle" class="filter-select" onchange="toggleHomepageTitle(this.value)"
                            style="border:none;background:transparent;color:var(--text);font-weight:bold;">
                            <option value="featured">Featured Products</option>
                            <option value="ticker">NEW ARRIVALS (Ticker)</option>
                        </select>
                    </div>
                    <div class="search-filter">
                        <input type="text" id="search-products" class="search-input" placeholder="Search products…"
                            oninput="filterProducts()">
                        <select id="filter-category" class="filter-select" onchange="filterProducts()">
                            <option value="all">All Categories</option>
                            <option value="skincare">Skincare</option>
                            <option value="haircare">Hair Care</option>
                            <option value="tools">Beauty Tools</option>
                            <option value="personalcare">Personal Care</option>
                            <option value="wears">Wears</option>
                            <option value="accessories">Accessories</option>
                            <option value="appliances">Appliances</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="openAddProduct()">+ Add Product</button>
                    <button class="btn btn-secondary" onclick="loadProducts()">↻ Refresh</button>
                </div>

                <div id="products-grid" class="products-grid-admin">
                    <!-- cards injected by JS -->
                </div>
                <div id="no-products" class="no-orders hidden"
                    style="text-align:center;padding:3rem;color:var(--muted)">
                    <p style="font-size:2rem;margin-bottom:.5rem">📦</p>
                    <p>No products found. Add your first product!</p>
                </div>
            </div>
        </main>
    </div>

    <!-- ══════════════════ ADD / EDIT PRODUCT MODAL ══════════════════ -->
    <div id="product-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="product-modal-title">Add Product</h2>
                <button class="modal-close" onclick="closeProductModal()">×</button>
            </div>
            <div class="modal-body">
                <form id="product-form" class="product-form" onsubmit="saveProduct(event)">
                    <input type="hidden" id="edit-product-id">
                    <input type="hidden" id="edit-image-url">

                    <!-- Image upload -->
                    <div class="form-group">
                        <label>Product Image</label>

                        <!-- Upload panel -->
                        <div id="panel-upload">
                            <div id="drop-zone" onclick="document.getElementById('file-input').click()"
                                ondragover="event.preventDefault();this.classList.add('dragover')"
                                ondragleave="this.classList.remove('dragover')" ondrop="handleDrop(event)"
                                style="border:2px dashed var(--border);border-radius:10px;padding:1.5rem;text-align:center;cursor:pointer;transition:border-color .2s,background .2s">
                                <div style="font-size:1.8rem;margin-bottom:.3rem">🖼️</div>
                                <p style="color:var(--muted);font-size:.85rem;margin:0">Drag &amp; drop or <strong
                                        style="color:var(--gold)">click to upload</strong></p>
                                <p style="color:var(--muted);font-size:.74rem;margin:.3rem 0 0">JPG, PNG, WEBP — max 800
                                    KB (auto-compressed)</p>
                            </div>
                            <input type="file" id="file-input" accept="image/*" style="display:none"
                                onchange="handleFileSelect(this)">
                            <div id="upload-status"
                                style="font-size:.78rem;color:var(--muted);margin-top:.4rem;min-height:1.2em"></div>
                        </div>

                        <!-- Preview -->
                        <img id="img-preview" alt="Preview"
                            style="width:100%;max-height:200px;object-fit:cover;border-radius:10px;margin-top:.75rem;display:none;border:1px solid var(--border)">
                        <input type="hidden" id="img-base64">
                        <input type="hidden" id="product-image-url">
                    </div>

                    <!-- Name & Price -->
                    <div class="form-row">
                        <div class="form-group">
                            <label>Product Name *</label>
                            <input type="text" id="p-name" required placeholder="e.g. Vitamin C Serum">
                        </div>
                        <div class="form-group">
                            <label>Price (FCFA) *</label>
                            <input type="number" id="p-price" required min="0" placeholder="e.g. 5000">
                        </div>
                    </div>

                    <!-- Category -->
                    <div class="form-row">
                        <div class="form-group">
                            <label>Category *</label>
                            <select id="p-category" required>
                                <option value="">— Select —</option>
                                <option value="skincare">Skincare</option>
                                <option value="haircare">Hair Care</option>
                                <option value="tools">Beauty Tools</option>
                                <option value="personalcare">Personal Care</option>
                                <option value="wears">Wears</option>
                                <option value="accessories">Accessories</option>
                                <option value="appliances">Appliances</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>

                    <!-- Description -->
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="p-description" placeholder="Describe the product…"></textarea>
                    </div>

                    <div style="display:flex;gap:.75rem;justify-content:flex-end;margin-top:.5rem">
                        <button type="button" class="btn btn-secondary" onclick="closeProductModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="save-product-btn">Save Product</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- ══════════════════ TOAST ══════════════════ -->
    <div id="toast"></div>

    <!-- ══════════════════ SCRIPTS ══════════════════ -->
    <script>
        /* ─────────────────────────────────────────────────────────────
           ADMIN PASSWORD — change this to something secure
        ───────────────────────────────────────────────────────────── */
        const ADMIN_PASSWORD = 'victorreigns2026';

        /* ─── State ─────────────────────────────────────────────── */
        let allProducts = [];
        let adminDb, adminFb;

        /* ─── Boot ──────────────────────────────────────────────── */
        function animateLoading() {
            let p = 0;
            const bar = document.getElementById('loading-bar');
            const pct = document.getElementById('loading-percentage');
            const iv = setInterval(() => {
                p += Math.random() * 18;
                if (p >= 100) { p = 100; clearInterval(iv); finishLoading(); }
                bar.style.width = p + '%';
                pct.textContent = Math.floor(p) + '%';
            }, 120);
        }

        function finishLoading() {
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('hidden');
                if (sessionStorage.getItem('vr_admin_auth') === '1') {
                    showPanel();
                } else {
                    document.getElementById('login-screen').classList.remove('hidden');
                }
            }, 400);
        }

        animateLoading();

        window.addEventListener('firebaseReady', () => {
            adminDb = window._db;
            adminFb = window._fb;
        });

        /* ─── Login ─────────────────────────────────────────────── */
        document.getElementById('login-form').addEventListener('submit', e => {
            e.preventDefault();
            const pw = document.getElementById('admin-password').value;
            if (pw === ADMIN_PASSWORD) {
                sessionStorage.setItem('vr_admin_auth', '1');
                document.getElementById('login-screen').classList.add('hidden');
                showPanel();
            } else {
                document.getElementById('login-error').textContent = 'Incorrect password.';
            }
        });

        function logout() {
            sessionStorage.removeItem('vr_admin_auth');
            location.reload();
        }

        function showPanel() {
            document.getElementById('admin-panel').classList.remove('hidden');
            loadProducts();
            loadSettings();
        }

        /* ─── Settings / Homepage Ticker ────────────────────────── */
        async function loadSettings() {
            if (!adminDb) return;
            try {
                const docSnap = await adminFb.getDoc(adminFb.doc(adminDb, 'settings', 'homepage'));
                if (docSnap.exists()) {
                    document.getElementById('home-title-toggle').value = docSnap.data().titleSelection || 'featured';
                }
            } catch (err) { console.error("Could not load settings", err); }
        }

        async function toggleHomepageTitle(val) {
            if (!adminDb) return;
            try {
                await adminFb.setDoc(adminFb.doc(adminDb, 'settings', 'homepage'), { titleSelection: val }, { merge: true });
                showToast('Homepage title updated ✓', 'success');
            } catch (err) {
                console.error("Could not config title", err);
                showToast('Error: ' + err.message, 'error');
            }
        }

        /* ─── Tab Switching ─────────────────────────────────────── */
        function switchTab(tab) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.admin-tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + '-section').classList.remove('hidden');
            event.currentTarget.classList.add('active');
            if (tab === 'products') loadProducts();
        }

        /* ═══════════════════════════════════════════════════════════
           PRODUCTS
        ═══════════════════════════════════════════════════════════ */
        async function loadProducts() {
            if (!adminDb) { showToast('Firebase not ready yet', 'error'); return; }
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '<p style="color:var(--muted);padding:2rem">Loading…</p>';

            try {
                const q = adminFb.query(adminFb.collection(adminDb, 'products'), adminFb.orderBy('createdAt', 'desc'));
                const snap = await adminFb.getDocs(q);
                allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderProducts(allProducts);
                updateProductStats(allProducts);
            } catch (err) {
                console.error(err);
                showToast('Failed to load products', 'error');
                grid.innerHTML = '<p style="color:var(--red);padding:2rem">Error loading products.</p>';
            }
        }

        function updateProductStats(products) {
            document.getElementById('total-products').textContent = products.length;
        }

        function renderProducts(products) {
            const grid = document.getElementById('products-grid');
            const none = document.getElementById('no-products');
            if (!products.length) {
                grid.innerHTML = '';
                none.classList.remove('hidden');
                return;
            }
            none.classList.add('hidden');
            grid.innerHTML = products.map(p => `
        <div class="product-card-admin">
            <img src="${p.imageUrl || 'assets/images/placeholder.png'}" alt="${p.name}"
                 onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'240\\' height=\\'180\\'><rect fill=\\'%23222\\' width=\\'240\\' height=\\'180\\'/>  <text fill=\\'%23555\\' x=\\'50%\\' y=\\'50%\\' text-anchor=\\'middle\\' dy=\\'.3em\\' font-size=\\'14\\'>No Image</text></svg>'">
            <div class="pc-body">
                <div class="pc-cat">${p.category || 'uncategorized'}</div>
                <div class="pc-name">${p.name}</div>
                <div class="pc-price">${Number(p.price).toLocaleString()} FCFA</div>
                <div class="pc-actions" style="margin-top:.75rem">
                    <button class="btn btn-secondary btn-sm" onclick="openEditProduct('${p.id}')">✏️ Edit</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p.id}','${(p.imageUrl || '').replace(/'/g, "\\'")}')">🗑️ Delete</button>
                </div>
            </div>
        </div>
    `).join('');
        }

        function filterProducts() {
            const q = document.getElementById('search-products').value.toLowerCase();
            const cat = document.getElementById('filter-category').value;
            const filtered = allProducts.filter(p => {
                const matchQ = !q || p.name.toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q);
                const matchCat = cat === 'all' || p.category === cat;
                return matchQ && matchCat;
            });
            renderProducts(filtered);
        }

        /* ─── Drag & drop ───────────────────────────────────────── */
        function handleDrop(e) {
            e.preventDefault();
            document.getElementById('drop-zone').classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) processImageFile(file);
        }
        function handleFileSelect(input) {
            const file = input.files[0];
            if (file) processImageFile(file);
        }

        /* ─── Compress + convert to base64 ─────────────────────── */
        function processImageFile(file) {
            if (!file.type.startsWith('image/')) {
                setUploadStatus('❌ Please select an image file.', true); return;
            }
            setUploadStatus('⏳ Processing…');
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const MAX = 900, Q = 0.75;
                    let w = img.width, h = img.height;
                    if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
                    const canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    const b64 = canvas.toDataURL('image/jpeg', Q);
                    const kb = Math.round(b64.length * 0.75 / 1024);
                    if (kb > 900) {
                        setUploadStatus(`⚠️ Compressed to ${kb} KB — try a smaller image for best performance.`);
                    } else {
                        setUploadStatus(`✅ Ready — ${kb} KB`);
                    }
                    document.getElementById('img-base64').value = b64;
                    const prev = document.getElementById('img-preview');
                    prev.src = b64; prev.style.display = 'block';
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }
        function setUploadStatus(msg, isErr) {
            const el = document.getElementById('upload-status');
            el.textContent = msg;
            el.style.color = isErr ? 'var(--red)' : 'var(--muted)';
        }

        /* ─── Add / Edit Product Modal ──────────────────────────── */
        function openAddProduct() {
            document.getElementById('product-modal-title').textContent = 'Add Product';
            document.getElementById('product-form').reset();
            document.getElementById('edit-product-id').value = '';
            document.getElementById('edit-image-url').value = '';
            document.getElementById('img-base64').value = '';
            document.getElementById('img-preview').style.display = 'none';
            document.getElementById('file-input').value = '';
            setUploadStatus('');
            document.getElementById('product-modal').classList.remove('hidden');
        }

        function openEditProduct(id) {
            const p = allProducts.find(x => x.id === id);
            if (!p) return;
            document.getElementById('product-modal-title').textContent = 'Edit Product';
            document.getElementById('edit-product-id').value = id;
            document.getElementById('edit-image-url').value = p.imageUrl || '';
            document.getElementById('img-base64').value = '';
            document.getElementById('p-name').value = p.name || '';
            document.getElementById('p-price').value = p.price || '';
            document.getElementById('p-category').value = p.category || '';
            document.getElementById('p-description').value = p.description || '';
            document.getElementById('file-input').value = '';
            setUploadStatus('');
            const prev = document.getElementById('img-preview');
            if (p.imageUrl) {
                prev.src = p.imageUrl; prev.style.display = 'block';
                setUploadStatus('Current image loaded — upload a new one to replace it.');
            } else {
                prev.style.display = 'none';
            }
            document.getElementById('product-modal').classList.remove('hidden');
        }

        function closeProductModal() {
            document.getElementById('product-modal').classList.add('hidden');
        }

        /* ─── Save (add or edit) ────────────────────────────────── */
        async function saveProduct(e) {
            e.preventDefault();
            if (!adminDb) { showToast('Firebase not ready', 'error'); return; }

            const btn = document.getElementById('save-product-btn');
            btn.disabled = true; btn.textContent = 'Saving…';

            const id = document.getElementById('edit-product-id').value;
            const name = document.getElementById('p-name').value.trim();
            const price = parseFloat(document.getElementById('p-price').value);
            const category = document.getElementById('p-category').value;
            const description = document.getElementById('p-description').value.trim();

            // Use newly uploaded base64, or keep existing stored image
            const b64 = document.getElementById('img-base64').value;
            const existing = document.getElementById('edit-image-url').value;
            const imageUrl = b64 || existing;

            if (!imageUrl) {
                showToast('Please add a product image', 'error');
                btn.disabled = false; btn.textContent = 'Save Product';
                return;
            }

            try {
                const data = {
                    name, price, category, description,
                    imageUrl,
                    updatedAt: adminFb.serverTimestamp()
                };

                if (id) {
                    await adminFb.updateDoc(adminFb.doc(adminDb, 'products', id), data);
                    showToast('Product updated ✓', 'success');
                } else {
                    data.createdAt = adminFb.serverTimestamp();
                    await adminFb.addDoc(adminFb.collection(adminDb, 'products'), data);
                    showToast('Product added ✓', 'success');
                }

                closeProductModal();
                loadProducts();
            } catch (err) {
                console.error(err);
                showToast('Error saving product: ' + err.message, 'error');
            } finally {
                btn.disabled = false; btn.textContent = 'Save Product';
            }
        }

        /* ─── Delete Product ────────────────────────────────────── */
        async function deleteProduct(id, imageUrl) {
            if (!confirm('Delete this product? This cannot be undone.')) return;
            try {
                await adminFb.deleteDoc(adminFb.doc(adminDb, 'products', id));
                // Try to delete image from Storage (non-critical)
                showToast('Product deleted', 'success');
                loadProducts();
            } catch (err) {
                console.error(err);
                showToast('Error deleting product', 'error');
            }
        }

        /* ─── Toast ─────────────────────────────────────────────── */
        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = type + ' show';
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.classList.remove('show'), 3000);
        }

    </script>
</body>

</html>
